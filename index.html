<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#17181c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="통역기">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2317181c'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle'%3E🎤%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2317181c'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle'%3E🎤%3C/text%3E%3C/svg%3E">
<title>실시간 음성 통역기</title>
<style>
  :root{ --ink:#17181c; --paper:#f7f6f3; --ko:#1f4e8c; --fx:#b3382c; --line:#d8d5cf; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column}
  header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);flex-shrink:0}
  header h1{font-size:15px;font-weight:800}
  .langSel{display:flex;gap:6px}
  .langSel button{border:1.5px solid var(--ink);background:none;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer}
  .langSel button.on{background:var(--ink);color:#fff}
  #log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .empty{color:#999;text-align:center;margin-top:40px;font-size:15px}
  .msg{max-width:88%;border-radius:14px;padding:12px 14px;background:#fff;border:1.5px solid var(--line)}
  .msg.ko{align-self:flex-end;border-color:var(--ko)}
  .msg.fx{align-self:flex-start;border-color:var(--fx)}
  .msg .who{font-size:11px;font-weight:800;margin-bottom:4px}
  .msg.ko .who{color:var(--ko)} .msg.fx .who{color:var(--fx)}
  .msg .orig{font-size:16px;color:#666;line-height:1.4;word-break:break-word}
  .msg .trans{font-size:23px;font-weight:700;line-height:1.4;margin-top:4px;word-break:break-word;min-height:1em}
  #live{font-size:14px;color:#555;text-align:center;padding:4px 14px;min-height:20px;flex-shrink:0}
  #status{text-align:center;font-size:13px;color:#777;min-height:18px;flex-shrink:0}
  footer{padding:10px 14px 26px;display:flex;gap:12px;flex-shrink:0}
  footer button{flex:1;height:86px;border-radius:16px;border:none;color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s}
  footer button:active{transform:scale(.97)}
  #koBtn{background:var(--ko)} #fxBtn{background:var(--fx)}
  footer button.listening{animation:pulse 1.1s infinite;outline:3px solid #17181c;outline-offset:2px}
  @keyframes pulse{0%{opacity:1}50%{opacity:.75}100%{opacity:1}}
  footer button:disabled{background:#bbb}
</style>
</head>
<body>
<header>
  <h1>실시간 통역</h1>
  <div class="langSel">
    <button id="selZh" class="on">중국어</button>
    <button id="selJa">일본어</button>
    <button id="selEn">영어</button>
  </div>
</header>
<div id="log"><div class="empty">아래 버튼을 누르고 말하세요.<br>대화 내용이 여기에 글로 쌓입니다.</div></div>
<div id="live"></div>
<div id="status"></div>
<div style="display:flex;gap:8px;padding:0 14px 8px;flex-shrink:0">
  <input id="typeIn" placeholder="말이 안 되면 여기에 입력 (키보드 마이크도 가능)" style="flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px">
  <button onclick="sendTyped('ko')" style="border:none;border-radius:10px;padding:0 12px;background:var(--ko);color:#fff;font-weight:800;font-size:13px">→외국어</button>
  <button onclick="sendTyped('fx')" style="border:none;border-radius:10px;padding:0 12px;background:var(--fx);color:#fff;font-weight:800;font-size:13px">→한국어</button>
</div>
<footer>
  <button id="koBtn">🎤 내가 말하기<br><span style="font-size:12px;font-weight:600">한국어 → 상대 언어</span></button>
  <button id="fxBtn">🎤 손님이 말하기<br><span style="font-size:12px;font-weight:600">상대 언어 → 한국어</span></button>
</footer>

<script>
const $ = id => document.getElementById(id);
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let fxLang = 'zh';
let rec = null, activeSide = null, wantListen = false, first = true;

const LANGS = {
  zh:{name:'중국어', bcp:'zh-CN', target:'중국어(간체)'},
  ja:{name:'일본어', bcp:'ja-JP', target:'일본어'},
  en:{name:'영어',  bcp:'en-US', target:'영어'}
};

if(!SR){
  $('status').textContent = '이 브라우저는 음성인식을 지원하지 않습니다. Chrome에서 열어주세요.';
  $('koBtn').disabled = $('fxBtn').disabled = true;
}

function setLang(l){
  fxLang = l;
  ['Zh','Ja','En'].forEach(k => $('sel'+k).classList.toggle('on', k.toLowerCase()===l));
  stopListen();
}
$('selZh').onclick = () => setLang('zh');
$('selJa').onclick = () => setLang('ja');
$('selEn').onclick = () => setLang('en');
$('koBtn').onclick = () => toggle('ko');
$('fxBtn').onclick = () => toggle('fx');

function toggle(side){
  unlockTTS(); // 아이폰: 버튼 터치 순간에 음성출력 잠금 해제
  if(activeSide === side){ stopListen(); return; }
  stopListen();
  startListen(side);
}

const IS_IOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

function startListen(side){
  activeSide = side; wantListen = true;
  rec = new SR();
  rec.lang = side === 'ko' ? 'ko-KR' : LANGS[fxLang].bcp;
  rec.interimResults = true;
  rec.continuous = !IS_IOS; // 아이폰은 연속모드가 불안정 → 짧게 듣고 자동 재시작

  rec.onstart = () => {
    $(side+'Btn').classList.add('listening');
    $('status').textContent = '듣는 중… (버튼을 다시 누르면 종료)';
  };
  rec.onresult = e => {
    const last = e.results[e.results.length-1];
    const t = last[0].transcript.trim();
    $('live').textContent = t ? '🎙 ' + t : '';
    if(last.isFinal && t){ $('live').textContent=''; translate(t, side); }
  };
  rec.onerror = e => {
    if(e.error === 'no-speech' || e.error === 'aborted') return; // 무시하고 재시작
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      $('status').textContent = '음성인식이 차단됨: 아이폰 설정 → 일반 → 키보드 → "받아쓰기 활성화" 켜고, Siri도 켜져 있어야 합니다. 그 후 페이지 새로고침.';
      wantListen = false; stopListen();
      return;
    }
    $('status').textContent = '음성인식 오류(' + e.error + ') — 다시 시도 중…';
  };
  rec.onend = () => {
    // 아이폰은 인식이 저절로 끝나므로 새로 만들어 재시작 (실시간 유지)
    if(wantListen && activeSide){
      const s = activeSide;
      setTimeout(() => { if(wantListen && activeSide === s) startListen(s); }, 250);
    }
  };
  try{ rec.start(); }catch(_){}
}

function stopListen(){
  wantListen = false;
  if(rec){ rec.onend = null; try{ rec.stop(); }catch(_){} rec = null; }
  if(activeSide) $(activeSide+'Btn').classList.remove('listening');
  activeSide = null;
  $('status').textContent = '';
  $('live').textContent = '';
}

function addMsg(side, orig){
  if(first){ $('log').innerHTML=''; first=false; }
  const d = document.createElement('div');
  d.className = 'msg ' + side;
  const who = side==='ko' ? '나 (한국어)' : '손님 ('+LANGS[fxLang].name+')';
  d.innerHTML = '<div class="who"></div><div class="orig"></div><div class="trans">…</div>';
  d.querySelector('.who').textContent = who;
  d.querySelector('.orig').textContent = orig;
  $('log').appendChild(d);
  $('log').scrollTop = $('log').scrollHeight;
  return d.querySelector('.trans');
}

// ── 문장 단위 분리: 전체 완료를 기다리지 않고 문장마다 즉시 음성 출력 ──
function makeSentenceSplitter(onSentence){
  let pending = '';
  const re = /[^。．.!?！？\n]+[。．.!?！？\n]+/g;
  return {
    push(t){
      pending += t;
      let m, last = 0;
      re.lastIndex = 0;
      while((m = re.exec(pending))){ onSentence(m[0].trim()); last = re.lastIndex; }
      if(last) pending = pending.slice(last);
    },
    flush(){ if(pending.trim()) onSentence(pending.trim()); pending = ''; }
  };
}

async function translate(text, side){
  const toFx = side === 'ko';
  const speakLang = toFx ? LANGS[fxLang].bcp : 'ko-KR';
  const sl = toFx ? 'ko' : GCODE[fxLang];
  const tl = toFx ? GCODE[fxLang] : 'ko';
  $('status').textContent = '번역 중…';
  const transEl = addMsg(side, text);
  try{
    let out = await gTranslate(text, sl, tl);
    if(!out) out = await mmTranslate(text, sl, tl);
    if(!out) throw new Error('empty');
    transEl.textContent = out;
    $('log').scrollTop = $('log').scrollHeight;
    // 문장 단위로 나눠 즉시 이어 읽기
    const split = makeSentenceSplitter(s => speak(s, speakLang));
    split.push(out); split.flush();
    $('status').textContent = activeSide ? '듣는 중… (버튼을 다시 누르면 종료)' : '';
  }catch(err){
    transEl.textContent = '(번역 실패 — 인터넷 연결을 확인하고 다시 말해주세요)';
    $('status').textContent = activeSide ? '듣는 중…' : '';
  }
}

const GCODE = { zh:'zh-CN', ja:'ja', en:'en' };

// 무료 구글 번역 (로그인·키 불필요)
async function gTranslate(text, sl, tl){
  try{
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl='
      + sl + '&tl=' + tl + '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    if(!res.ok) return null;
    const data = await res.json();
    return (data[0]||[]).map(seg => seg[0]).join('').trim() || null;
  }catch(_){ return null; }
}

// 폴백: MyMemory 무료 번역
async function mmTranslate(text, sl, tl){
  try{
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text)
      + '&langpair=' + sl + '|' + tl;
    const res = await fetch(url);
    if(!res.ok) return null;
    const data = await res.json();
    return (data.responseData && data.responseData.translatedText || '').trim() || null;
  }catch(_){ return null; }
}

// ── 음성 출력: 문장 큐 방식 (앞 문장 끊지 않고 이어 읽기) ──
let voiceCache = {};
function getVoice(lang){
  if(voiceCache[lang] !== undefined) return voiceCache[lang];
  const v = speechSynthesis.getVoices().find(v => v.lang.replace('_','-').startsWith(lang.slice(0,2)));
  voiceCache[lang] = v || null;
  return voiceCache[lang];
}
function speak(text, lang){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 1.0;
  const v = getVoice(lang);
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
let ttsUnlocked = false;
function unlockTTS(){
  if(ttsUnlocked) return;
  try{
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    speechSynthesis.speak(u);
    ttsUnlocked = true;
  }catch(_){}
}

// 목소리 미리 로드 (첫 발화 지연 방지)
function sendTyped(side){
  unlockTTS();
  const v = $('typeIn').value.trim();
  if(!v) return;
  $('typeIn').value = '';
  translate(v, side);
}

speechSynthesis.getVoices();
if(speechSynthesis.onvoiceschanged !== undefined){
  speechSynthesis.onvoiceschanged = () => { voiceCache = {}; speechSynthesis.getVoices(); };
}
</script>
</body>
</html>
